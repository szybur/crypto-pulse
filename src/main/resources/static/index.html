<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CryptoPulse</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="page">
    <header class="header">
        <h1>CryptoPulse</h1>
        <p class="subtitle">Real-time cryptocurrency dashboard powered by Ktor</p>
    </header>

    <main>
        <section class="card">
            <div class="card-header">
                <h2>Assets</h2>
                <button id="reload-button">Reload</button>
            </div>

            <p id="status-text">Loading assets...</p>

            <div class="table-wrapper">
                <table id="assets-table" class="assets-table hidden">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Symbol</th>
                        <th>Price</th>
                        <th>Market Cap</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody id="assets-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="/app.js"></script>
</body>
</html>
